<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldoria Pro - Professional RPG Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap');

        :root {
            --gold: #FFD700; --crimson: #800000; --mana: #1E90FF;
            --surface: #121212; --panel: #1E1E1E; --border: #333;
            --rarity-0: #fff; --rarity-1: #1eff00; --rarity-2: #0070dd; --rarity-3: #a335ee;
        }

        body { 
            background: #000; color: #f0f0f0; font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Layout Profissional */
        #app {
            display: grid; grid-template-columns: 320px 1fr 350px;
            grid-template-rows: 60px 1fr 200px; width: 100%; gap: 2px; background: var(--border);
        }

        .panel { background: var(--surface); padding: 20px; overflow-y: auto; }

        header { grid-column: 1 / 4; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: #0a0a0a; }

        /* Atributos e Stats */
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-value { font-weight: bold; color: var(--gold); }

        /* Progress Bars */
        .bar-wrap { width: 100%; height: 12px; background: #222; border-radius: 6px; margin: 4px 0 15px; overflow: hidden; border: 1px solid #333; }
        .bar-fill { height: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* World View */
        #world-display { grid-column: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 500px; }

        /* Inventory System */
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .item-slot { 
            aspect-ratio: 1; background: #1a1a1a; border: 1px solid #333; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 24px; position: relative; transition: 0.2s;
        }
        .item-slot:hover { border-color: var(--gold); background: #252525; }
        .item-slot.equipped { border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.2); }

        /* Combat Log */
        #log { grid-column: 2; grid-row: 3; background: #080808; border-top: 1px solid #222; padding: 15px; font-family: 'monospace'; font-size: 13px; color: #888; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #333; padding-left: 8px; }

        /* Buttons */
        .btn {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; font-family: 'Cinzel'; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover:not(:disabled) { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        /* Overlays */
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-family: 'Cinzel'; color: var(--gold); font-size: 3rem; margin-bottom: 0;">ELDORIA PRO</h1>
        <p style="color: #666; margin-bottom: 40px;">Professional RPG Framework</p>
        <input type="text" id="p-name" placeholder="NOME DO PERSONAGEM" style="padding: 15px; background: #111; border: 1px solid var(--gold); color: #fff; width: 300px; text-align: center;">
        <br>
        <button class="btn" onclick="Engine.start()">DESPERTAR</button>
    </div>

    <div id="app">
        <header>
            <div id="ui-hero-name" style="font-family: 'Cinzel'; font-size: 1.2rem; color: var(--gold);">---</div>
            <div style="display: flex; gap: 30px;">
                <span>GOLD: <b id="ui-gold" style="color: var(--gold);">0</b></span>
                <span>MATERIAIS: <b id="ui-mats" style="color: #aaa;">0</b></span>
            </div>
            <button class="btn" style="padding: 5px 15px; font-size: 10px;" onclick="Engine.save()">SALVAR CLOUD (LOCAL)</button>
        </header>

        <aside class="panel">
            <h3 style="font-family: 'Cinzel'; margin-top: 0;">STATUS DO HERÓI</h3>
            <div class="stat-row"><span>NÍVEL</span><span id="ui-lvl" class="stat-value">1</span></div>
            <div class="bar-wrap"><div id="bar-exp" class="bar-fill" style="background: var(--mana); width: 0%"></div></div>
            
            <div class="stat-row"><span>VITALIDADE</span><span id="ui-hp-text" class="stat-value">0/0</span></div>
            <div class="bar-wrap"><div id="bar-hp" class="bar-fill" style="background: var(--crimson); width: 100%"></div></div>

            <div style="background: #111; padding: 15px; border-radius: 4px; margin-top: 20px;">
                <div class="stat-row"><span>ATAQUE TOTAL</span><span id="ui-atk" class="stat-value">0</span></div>
                <div class="stat-row"><span>DEFESA TOTAL</span><span id="ui-def" class="stat-value">0</span></div>
                <div class="stat-row"><span>SORTE</span><span id="ui-luk" class="stat-value">0</span></div>
            </div>
        </aside>

        <main id="world-display">
            <div id="scene-title" style="font-family: 'Cinzel'; font-size: 1.5rem; margin-bottom: 30px; color: #fff;">VILAREJO DE ÁRATHON</div>
            <div class="action-grid">
                <button class="btn" id="btn-explore" onclick="Engine.action('explore')">Explorar Arredores</button>
                <button class="btn" id="btn-blacksmith" onclick="Engine.action('blacksmith')">Ferreiro Real</button>
                <button class="btn" id="btn-rest" onclick="Engine.action('rest')">Descansar</button>
                <button class="btn" id="btn-trade" onclick="Engine.action('trade')">Mercado</button>
            </div>
        </main>

        <section class="panel">
            <h3 style="font-family: 'Cinzel'; margin-top: 0;">INVENTÁRIO</h3>
            <div class="inv-grid" id="inventory-slots">
                </div>
            <div id="item-tooltip" style="margin-top: 20px; font-size: 12px; color: #888; border-top: 1px solid #222; padding-top: 10px;">
                Selecione um item para ver detalhes ou equipar.
            </div>
        </section>

        <div id="log"></div>
    </div>

    <script>
        /**
         * ENGINE CORE - DESIGN PATTERN: SINGLETON MODULE
         * Gerenciamento de estado imutável e lógica desacoplada.
         */
        const Engine = (() => {
            // Estado Privado
            let state = {
                player: {
                    name: "Aventureiro", lvl: 1, exp: 0, gold: 100, mats: 0,
                    baseAtk: 10, baseDef: 5, baseLuk: 5,
                    hp: 100, maxHp: 100,
                    inventory: [],
                    equipped: { weapon: null, armor: null }
                },
                isBusy: false,
                config: { expBase: 100, expGrowth: 1.5 }
            };

            // Database de Itens (Imutável)
            const ITEMS = {
                W01: { id: 'W01', name: "Espada Curta", atk: 5, icon: "🗡️", type: 'weapon', rarity: 0 },
                W02: { id: 'W02', name: "Machado de Guerra", atk: 15, icon: "🪓", type: 'weapon', rarity: 1 },
                A01: { id: 'A01', name: "Couraça de Couro", def: 8, icon: "🛡️", type: 'armor', rarity: 0 },
                P01: { id: 'P01', name: "Poção de Vida", heal: 50, icon: "🧪", type: 'consumable', rarity: 0 }
            };

            // --- LÓGICA DE ATRIBUTOS (CÁLCULO DINÂMICO) ---
            const getStats = () => {
                let atk = state.player.baseAtk;
                let def = state.player.baseDef;
                
                if(state.player.equipped.weapon) atk += ITEMS[state.player.equipped.weapon].atk;
                if(state.player.equipped.armor) def += ITEMS[state.player.equipped.armor].def;
                
                return { atk, def };
            };

            // --- SISTEMA DE UI (RENDERING) ---
            const updateUI = () => {
                const stats = getStats();
                const p = state.player;

                document.getElementById('ui-hero-name').innerText = p.name;
                document.getElementById('ui-lvl').innerText = p.lvl;
                document.getElementById('ui-gold').innerText = Math.floor(p.gold);
                document.getElementById('ui-mats').innerText = p.mats;
                document.getElementById('ui-atk').innerText = stats.atk;
                document.getElementById('ui-def').innerText = stats.def;
                document.getElementById('ui-luk').innerText = p.baseLuk;
                document.getElementById('ui-hp-text').innerText = `${Math.floor(p.hp)} / ${p.maxHp}`;
                
                document.getElementById('bar-hp').style.width = (p.hp / p.maxHp * 100) + "%";
                document.getElementById('bar-exp').style.width = (p.exp / (state.config.expBase * Math.pow(state.config.expGrowth, p.lvl-1)) * 100) + "%";

                renderInventory();
            };

            const renderInventory = () => {
                const container = document.getElementById('inventory-slots');
                container.innerHTML = "";
                for(let i=0; i<12; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    const itemId = state.player.inventory[i];
                    
                    if(itemId) {
                        const item = ITEMS[itemId];
                        slot.innerHTML = item.icon;
                        slot.style.color = `var(--rarity-${item.rarity})`;
                        if(state.player.equipped.weapon === itemId || state.player.equipped.armor === itemId) {
                            slot.classList.add('equipped');
                        }
                        slot.onclick = () => useItem(i);
                    }
                    container.appendChild(slot);
                }
            };

            // --- MOTOR DE AÇÕES ---
            const action = (type) => {
                if(state.isBusy) return;
                state.isBusy = true;
                
                // Feedback visual de ação
                const btn = document.activeElement;
                if(btn) btn.disabled = true;

                setTimeout(() => {
                    switch(type) {
                        case 'explore': exploreLogic(); break;
                        case 'blacksmith': upgradeLogic(); break;
                        case 'rest': restLogic(); break;
                    }
                    state.isBusy = false;
                    if(btn) btn.disabled = false;
                    updateUI();
                }, 400); // Global Cooldown de 400ms
            };

            const exploreLogic = () => {
                if(state.player.hp <= 20) return log("Você está muito fraco para explorar!", "orange");
                
                const win = Math.random() > 0.3;
                if(win) {
                    const gainGold = 10 + (state.player.lvl * 2);
                    const gainExp = 25;
                    state.player.gold += gainGold;
                    state.player.exp += gainExp;
                    state.player.hp -= 15;
                    log(`Vitória! +${gainGold} gold, +${gainExp} exp.`, "#44ff44");
                    
                    // Drop de Item (Lógica de IDs)
                    if(Math.random() > 0.8) {
                        const keys = Object.keys(ITEMS);
                        const drop = keys[Math.floor(Math.random()*keys.length)];
                        if(state.player.inventory.length < 12) {
                            state.player.inventory.push(drop);
                            log(`DROP: Você encontrou ${ITEMS[drop].name}!`, "var(--gold)");
                        }
                    }
                } else {
                    state.player.hp -= 30;
                    log("Derrota! Você fugiu ferido.", "#ff4444");
                }
                checkLevelUp();
            };

            const useItem = (index) => {
                const itemId = state.player.inventory[index];
                const item = ITEMS[itemId];
                
                if(item.type === 'weapon') state.player.equipped.weapon = itemId;
                if(item.type === 'armor') state.player.equipped.armor = itemId;
                if(item.type === 'consumable') {
                    state.player.hp = Math.min(state.player.maxHp, state.player.hp + item.heal);
                    state.player.inventory.splice(index, 1);
                }
                log(`Você interagiu com ${item.name}.`);
                updateUI();
            };

            const checkLevelUp = () => {
                const needed = state.config.expBase * Math.pow(state.config.expGrowth, state.player.lvl - 1);
                if(state.player.exp >= needed) {
                    state.player.lvl++;
                    state.player.exp = 0;
                    state.player.maxHp += 20;
                    state.player.hp = state.player.maxHp;
                    state.player.baseAtk += 3;
                    log(`LEVEL UP! Você alcançou o nível ${state.player.lvl}`, "cyan");
                }
            };

            const log = (msg, color = "#888") => {
                const l = document.getElementById('log');
                l.innerHTML = `<div class="log-entry" style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
            };

            // --- PERSISTÊNCIA ---
            const save = () => {
                localStorage.setItem('eldoria_pro_save', JSON.stringify(state.player));
                log("Sincronizando com a nuvem... Sucesso!", "var(--gold)");
            };

            const start = () => {
                const name = document.getElementById('p-name').value || "Herói";
                const saved = localStorage.getItem('eldoria_pro_save');
                if(saved) {
                    state.player = JSON.parse(saved);
                    log("Crônicas carregadas.");
                } else {
                    state.player.name = name;
                }
                document.getElementById('overlay').style.display = 'none';
                updateUI();
            };

            return { start, action, save };
        })();
    </script>
</body>
</html>
